name: 📝 Latest Blog Posts

on:
  schedule:
    # Run daily at 6:00 UTC
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # 🔧 把你的博客 RSS/Atom feed 地址填到这里
          # 支持多个 feed：feed_list: "https://blog.example.com/feed.xml,https://another.blog/rss"
          feed_list: "${{ secrets.BLOG_RSS_URL }}"
          max_post_count: 5
          template: "- [$title]($url) · $date"
          date_format: "mmm dd, yyyy"
          comment_tag_name: BLOG-POST-LIST
          commit_message: "📝 Update blog posts"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
